name: Tests

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: gonveyor
          POSTGRES_PASSWORD: gonveyor
          POSTGRES_DB: gonveyor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gonveyor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            examples/shared/go.sum
            examples/factory/go.sum
            examples/publisher/go.sum

      - name: Run migration
        run: psql -h localhost -U gonveyor -d gonveyor -f scripts/migrations/001_init.sql
        env:
          PGPASSWORD: gonveyor

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build
        run: make build

      - name: Test
        run: make test-ci
        env:
          POSTGRES_DSN: postgres://gonveyor:gonveyor@localhost:5432/gonveyor?sslmode=disable

      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests
          path: reports/*.xml
          reporter: java-junit

  release:
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag store/bun submodule
        run: |
          git tag store/bun/${{ steps.tag.outputs.new_tag }}
          git push origin store/bun/${{ steps.tag.outputs.new_tag }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true
